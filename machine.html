
<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme Certification — Amcor Flexibles Mohammedia</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --primary: #0B2E5F; --primary-mid: #1A4E8C; --primary-light: #2D72D2;
          --accent: #E8760A; --accent-light: #F59637; --teal: #00A3A3;
          --green: #0F7E4A; --green-bg: #E6F5EE; --red: #C0392B; --red-bg: #FDEEEC;
          --text: #0D1F33; --text-mid: #3D5670; --text-muted: #6B85A0;
          --border: #D0DDE8; --bg: #EEF3F9; --bg-card: #FFFFFF;
          --shadow: 0 2px 16px rgba(11,46,95,0.09); --shadow-lg: 0 8px 40px rgba(11,46,95,0.15);
          --radius: 14px; --radius-sm: 8px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: "DM Sans", sans-serif;
          background: var(--bg);
          color: var(--text);
          min-height: 100vh;
          line-height: 1.55;
          background-image: radial-gradient(ellipse at 80% 0%, rgba(45,114,210,0.08) 0%, transparent 55%), radial-gradient(ellipse at 10% 100%, rgba(11,46,95,0.06) 0%, transparent 45%);
        }
        .topbar {
          background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 100%);
          padding: 0 48px;
          height: 76px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          box-shadow: 0 4px 20px rgba(11,46,95,0.3);
          position: sticky;
          top: 0;
          z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 20px; }
        .logo-wrap {
          background: white;
          border-radius: 10px;
          padding: 5px 12px;
          display: flex;
          align-items: center;
          box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .logo-img { height: 38px; width: auto; display: block; }
        .divider-line { width: 1px; height: 36px; background: rgba(255,255,255,0.25); }
        .site-name {
          font-family: "Sora", sans-serif;
          font-size: 15px;
          font-weight: 700;
          color: #FFFFFF;
          letter-spacing: 0.3px;
          line-height: 1.2;
        }
        .site-name span {
          display: block;
          font-weight: 400;
          font-size: 11px;
          color: rgba(255,255,255,0.65);
          letter-spacing: 1.5px;
          text-transform: uppercase;
          font-family: "DM Sans", sans-serif;
          margin-top: 2px;
        }
        .topbar-badge {
          display: flex;
          align-items: center;
          gap: 8px;
          background: rgba(255,255,255,0.12);
          border: 1px solid rgba(255,255,255,0.2);
          border-radius: 20px;
          padding: 6px 16px;
          font-size: 12px;
          color: rgba(255,255,255,0.9);
          font-weight: 500;
          letter-spacing: 0.3px;
        }
        .topbar-badge::before {
          content: "";
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--accent-light);
          flex-shrink: 0;
          animation: pulse 2s infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.6; transform: scale(0.85); }
        }
        .wrapper {
          max-width: 1100px;
          margin: 0 auto;
          padding: 48px 24px 90px;
        }
        .selection-card {
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 48px 52px;
          box-shadow: var(--shadow-lg);
          position: relative;
          overflow: hidden;
          text-align: center;
        }
        .selection-card::before {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 5px;
          background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--teal));
        }
        .machine-header {
          margin-bottom: 32px;
        }
        .machine-header h1 {
          font-family: "Sora", sans-serif;
          font-size: 28px;
          font-weight: 800;
          color: var(--primary);
          margin-bottom: 10px;
        }
        .machine-header p {
          font-size: 15px;
          color: var(--text-mid);
          max-width: 500px;
          margin: 0 auto;
        }
        .machines-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
          gap: 28px;
          margin: 40px 0 20px;
        }
        .machine-btn {
          background: var(--bg-card);
          border: 2px solid var(--border);
          border-radius: 20px;
          padding: 32px 20px;
          cursor: pointer;
          transition: all 0.25s ease;
          text-align: center;
          box-shadow: var(--shadow);
        }
        .machine-btn:hover {
          transform: translateY(-6px);
          border-color: var(--primary-light);
          box-shadow: 0 16px 32px rgba(11,46,95,0.18);
          background: linear-gradient(135deg, rgba(11,46,95,0.02), rgba(45,114,210,0.04));
        }
        .machine-icon {
          font-size: 56px;
          margin-bottom: 20px;
        }
        .machine-name {
          font-family: "Sora", sans-serif;
          font-size: 24px;
          font-weight: 800;
          color: var(--primary);
          margin-bottom: 10px;
        }
        .machine-desc {
          font-size: 13px;
          color: var(--text-muted);
          line-height: 1.5;
          margin-bottom: 16px;
        }
        .machine-status {
          display: inline-block;
          padding: 6px 14px;
          border-radius: 30px;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 0.8px;
          text-transform: uppercase;
          background: var(--green-bg);
          color: var(--green);
          border: 1px solid rgba(15,126,74,0.25);
        }
        .machine-status.disabled {
          background: var(--red-bg);
          color: var(--red);
          border-color: rgba(192,57,43,0.2);
        }
        .machine-status.coming {
          background: rgba(45,114,210,0.1);
          color: var(--primary-light);
          border-color: rgba(45,114,210,0.2);
        }
        .footer-note {
          margin-top: 48px;
          font-size: 12px;
          color: var(--text-muted);
          border-top: 1px solid var(--border);
          padding-top: 28px;
          display: flex;
          justify-content: center;
          gap: 24px;
          flex-wrap: wrap;
        }
        .footer-note a {
          color: var(--primary-light);
          text-decoration: none;
          font-weight: 600;
        }
        .footer-note a:hover {
          text-decoration: underline;
        }
        @media (max-width: 620px) {
          .topbar { padding: 0 16px; height: 68px; }
          .topbar-badge { display: none; }
          .selection-card { padding: 28px 22px; }
          .wrapper { padding: 24px 16px 70px; }
          .machine-header h1 { font-size: 22px; }
          .machines-grid { gap: 20px; }
        }
    </style>
</head>
